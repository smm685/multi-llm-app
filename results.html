<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Compare - Results</title>
    <link rel="stylesheet" href="results.css">
</head>
<body>
    <div class="container">
        <h1>Results</h1>
        <p id="promptDisplay"></p>
        <div id="responsesContainer" class="responses-grid"></div>
        <button class="btn-primary" onclick="window.location.href='query.html'">New Query</button>
    </div>
    <script>
        const results = JSON.parse(localStorage.getItem('llmResults') || '[]');
        const prompt = localStorage.getItem('llmPrompt') || '';
        document.getElementById('promptDisplay').innerText = 'Prompt: ' + prompt;
        const container = document.getElementById('responsesContainer');
        if (results.length === 0) {
            container.innerHTML = '<p>No results found.</p>';
        } else {
            results.forEach(r => {
                const col = document.createElement('div');
                col.className = 'response-column';
                col.innerHTML = `<h3>${r.model}</h3><p>${r.text}</p>`;
                container.appendChild(col);
            });
        }
    </script>
</body>
</html>
